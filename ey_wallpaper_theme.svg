  <!-- Bottom right label -->
  <text x="1256" y="688" font-family="Arial" font-size="9" fill="#555" text-anchor="end" letter-spacing="1">MARCH 2026</text>

  <!-- Small yellow dots scattered -->
  <circle cx="320" cy="180" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="640" cy="180" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="960" cy="180" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="320" cy="360" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="640" cy="360" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="960" cy="360" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="320" cy="540" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="640" cy="540" r="3" fill="#FFE600" opacity="0.4"/>
  <circle cx="960" cy="540" r="3" fill="#FFE600" opacity="0.4"/>

  <!-- Top right corner tag -->
  <rect x="1100" y="0" width="180" height="36" fill="#FFE600"/>
  <text x="1190" y="22" font-family="Arial" font-size="11" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">POWER BI DASHBOARD</text>
